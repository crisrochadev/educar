<h2 class="page-title">Dashboard</h2>
<div class="grid">
  <div class="col-12 md:col-6 lg:col-3" *ngFor="let card of cards">
    <p-card styleClass="section-card">
      <div class="flex justify-content-between align-items-center">
        <div>
          <div class="text-500">{{ card.label }}</div>
          <h3>{{ card.value }}</h3>
        </div>
        <i [class]="card.icon + ' text-2xl text-blue-500'"></i>
      </div>
    </p-card>
  </div>
</div>
